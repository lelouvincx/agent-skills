version: 1

ownership_entities:
  lelouvincx:
    description: Personal projects owned by Chinh.
  lelouvincx-bot:
    description: Automation and bot-owned projects or workflows.
  holistics:
    description: Holistics work projects.
  open-source:
    description: External or contributed open-source projects.

environments:
  local:
    workspace_root: ~/Developer
    detect:
      workspace_root_exists: ~/Developer
  amp-orb:
    # Default only. Amp Orb workspace paths may change; use
    # AGENTS_REGISTRY_WORKSPACE_ROOT to override at runtime.
    workspace_root: /home/user/workspace
    project_dir_overrides:
      agent-skills: repo
    detect:
      env:
        AMP_ORB: "true"
      workspace_root_exists: /home/user/workspace
  vps:
    # Default only. VPS workspace paths may vary; use
    # AGENTS_REGISTRY_WORKSPACE_ROOT to override at runtime.
    workspace_root: /home/lelouvincx
    detect:
      workspace_root_exists: /home/lelouvincx

projects:
  logseq:
    github: lelouvincx/second-brain-logseq
    owner: lelouvincx
    dir: second-brain-logseq
    aliases:
      - second-brain-logseq
      - second brain logseq
      - second brain
      - log this to logseq
      - second-brain
    description: Logseq graph and personal second brain.

  agent-skills:
