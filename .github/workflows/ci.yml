name: CI

on:
  pull_request:
    paths:
      - "amp/docs/rfcs/**"
      - "amp/docs/tools/**"
      - "amp/plugins/**"
      - "amp/scripts/validate-rfcs.py"
      - "amp/scripts/validate-plugin-docs.py"
      - "amp/scripts/test_validate_plugin_docs.py"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "amp/docs/rfcs/**"
      - "amp/docs/tools/**"
      - "amp/plugins/**"
      - "amp/scripts/validate-rfcs.py"
      - "amp/scripts/validate-plugin-docs.py"
      - "amp/scripts/test_validate_plugin_docs.py"
      - ".github/workflows/ci.yml"

jobs:
  validate-amp-plugin-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Amp doc validator dependencies
        run: python3 -m pip install PyYAML==6.0.3

      - name: Test Amp artifact doc validator
        run: python3 -m unittest amp/scripts/test_validate_plugin_docs.py

      - name: Validate Amp artifact docs
        run: python3 amp/scripts/validate-plugin-docs.py

      - name: Validate Amp RFC docs
        run: python3 amp/scripts/validate-rfcs.py
