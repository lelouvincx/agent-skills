name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "22"
  PRE_COMMIT_VERSION: "4.2.0"
  PYYAML_VERSION: "6.0.3"
  PYTHON_VERSION: "3.13"
  RAPIDFUZZ_VERSION: "3.14.3"
  UV_VERSION: "0.8.22"

jobs:
  select-checks:
    name: Select validation jobs
    runs-on: ubuntu-latest
    outputs:
      amp: ${{ steps.paths.outputs.amp }}
      plugins: ${{ steps.paths.outputs.plugins }}
      projection: ${{ steps.paths.outputs.projection }}
      registry: ${{ steps.paths.outputs.registry }}
      sdk: ${{ steps.paths.outputs.sdk }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: paths
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            amp:
              - "amp/docs/**"
              - "amp/plugins/**"
              - "amp/scripts/validate-plugin-docs.py"
              - "amp/scripts/validate-rfcs.py"
              - "amp/scripts/test_validate_plugin_docs.py"
              - ".pre-commit-config.yaml"
              - ".github/workflows/ci.yml"
            registry:
              - "projects.yaml"
              - "PROJECTS.md"
              - "bin/project-resolve"
              - "scripts/check-project-registry"
              - "scripts/check-project-resolver"
              - ".pre-commit-config.yaml"
              - ".github/workflows/ci.yml"
            projection:
              - "amp/**"
              - "bin/**"
              - "skills/**"
              - "projects.yaml"
              - "PROJECTS.md"
              - "sync-skills.sh"
              - "scripts/check-projection"
              - ".pre-commit-config.yaml"
              - ".github/workflows/ci.yml"
            plugins:
              - "amp/plugins/**"
              - "scripts/check-plugin-builds"
              - ".pre-commit-config.yaml"
              - ".github/workflows/ci.yml"
            sdk:
              - "sdk/**"
              - ".pre-commit-config.yaml"
              - ".github/workflows/ci.yml"

  file-hygiene:
    name: File hygiene (pre-commit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install validation dependencies
        run: >-
          python -m pip install
          "pre-commit==${PRE_COMMIT_VERSION}"
          "PyYAML==${PYYAML_VERSION}"
          "rapidfuzz==${RAPIDFUZZ_VERSION}"

      - name: Run pre-commit on changed files
        env:
          FROM_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
          TO_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: pre-commit run --from-ref "$FROM_REF" --to-ref "$TO_REF" --show-diff-on-failure

  validate-amp-artifacts:
    name: Validate Amp artifacts and RFCs
    needs: select-checks
    if: needs.select-checks.outputs.amp == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Amp validator dependencies
        run: python -m pip install "PyYAML==${PYYAML_VERSION}"

      - name: Test Amp artifact doc validator
        run: python -m unittest amp/scripts/test_validate_plugin_docs.py

      - name: Validate Amp artifact docs
        run: python amp/scripts/validate-plugin-docs.py

      - name: Validate Amp RFC docs
        run: python amp/scripts/validate-rfcs.py

  validate-project-registry:
    name: Validate project registry
    needs: select-checks
    if: needs.select-checks.outputs.registry == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install registry dependencies
        run: >-
          python -m pip install
          "PyYAML==${PYYAML_VERSION}"
          "rapidfuzz==${RAPIDFUZZ_VERSION}"
          "uv==${UV_VERSION}"

      - name: Validate registry and generated documentation
        run: scripts/check-project-registry

      - name: Test project resolver behavior
        run: scripts/check-project-resolver

  validate-projection:
    name: Validate isolated projection
    needs: select-checks
    if: needs.select-checks.outputs.projection == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate projection in temporary runtime paths
        run: scripts/check-projection

  validate-plugins:
    name: Validate plugin builds
    needs: select-checks
    if: needs.select-checks.outputs.plugins == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Build plugins
        run: scripts/check-plugin-builds

  validate-sdk:
    name: Validate SDK npm workspace
    needs: select-checks
    if: needs.select-checks.outputs.sdk == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies from lockfile
        run: npm ci
        working-directory: sdk

  validation-gate:
    name: Validation gate
    if: always()
    needs:
      - select-checks
      - validate-amp-artifacts
      - validate-project-registry
      - validate-projection
      - validate-plugins
      - validate-sdk
    runs-on: ubuntu-latest

    steps:
      - name: Require successful applicable checks
        env:
          SELECT_RESULT: ${{ needs.select-checks.result }}
          AMP_SELECTED: ${{ needs.select-checks.outputs.amp }}
          AMP_RESULT: ${{ needs.validate-amp-artifacts.result }}
          REGISTRY_SELECTED: ${{ needs.select-checks.outputs.registry }}
          REGISTRY_RESULT: ${{ needs.validate-project-registry.result }}
          PROJECTION_SELECTED: ${{ needs.select-checks.outputs.projection }}
          PROJECTION_RESULT: ${{ needs.validate-projection.result }}
          PLUGINS_SELECTED: ${{ needs.select-checks.outputs.plugins }}
          PLUGINS_RESULT: ${{ needs.validate-plugins.result }}
          SDK_SELECTED: ${{ needs.select-checks.outputs.sdk }}
          SDK_RESULT: ${{ needs.validate-sdk.result }}
        run: |
          if [ "$SELECT_RESULT" != "success" ]; then
            echo "Select validation jobs: $SELECT_RESULT"
            exit 1
          fi

          check_result() {
            name="$1"
            selected="$2"
            result="$3"

            if [ "$selected" = "true" ] && [ "$result" != "success" ]; then
              echo "$name was selected but finished with: $result"
              exit 1
            fi

            if [ "$selected" != "true" ] && [ "$result" != "skipped" ]; then
              echo "$name was not selected but finished with: $result"
              exit 1
            fi
          }

          check_result "Amp validation" "$AMP_SELECTED" "$AMP_RESULT"
          check_result "Registry validation" "$REGISTRY_SELECTED" "$REGISTRY_RESULT"
          check_result "Projection validation" "$PROJECTION_SELECTED" "$PROJECTION_RESULT"
          check_result "Plugin validation" "$PLUGINS_SELECTED" "$PLUGINS_RESULT"
          check_result "SDK validation" "$SDK_SELECTED" "$SDK_RESULT"
