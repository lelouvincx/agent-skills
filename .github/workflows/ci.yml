name: CI

on:
  pull_request:
    paths:
      - "amp/docs/tools/**"
      - "amp/plugins/**"
      - "amp/scripts/validate-plugin-docs.py"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "amp/docs/tools/**"
      - "amp/plugins/**"
      - "amp/scripts/validate-plugin-docs.py"
      - ".github/workflows/ci.yml"

jobs:
  validate-amp-plugin-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Amp plugin docs
        run: python3 amp/scripts/validate-plugin-docs.py
